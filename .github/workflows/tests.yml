name: Tests

# Runs the InputForge.Tests suite on every push to a non-main branch, and on pull
# requests to main. Pushes to main itself are not built: main is protected and only
# reached via PR, which already ran this suite — re-running on the merge commit would
# just repeat a green result. The PR run is the gate (wire it up as a required check
# in branch protection).
# The suite executes against a REAL headless Godot runtime embedded by the 2dog
# NuGet package — no separate Godot install step is needed; restoring the test
# project pulls the matching Godot 4.7.1 binary down with it.

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

# Cancel an in-progress run if the same PR/branch gets a newer push.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (.NET 10 + headless Godot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the NuGet package store. Keyed on the project/lock files so the cache is
      # reused until a dependency version changes.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore InputForge.Tests/InputForge.Tests.csproj

      - name: Build
        run: dotnet build InputForge.Tests/InputForge.Tests.csproj --configuration Debug --no-restore

      # The tests run through Microsoft Testing Platform (xUnit v3's self-hosting runner), NOT the
      # VSTest adapter: VSTest's out-of-process launcher (vstest.console reading JSON over stdout)
      # breaks on .NET 10 + 2dog/Godot ("Test process did not return valid JSON"). `dotnet run`
      # launches the test executable directly, sidestepping it — the process exit code gates the job.
      #
      # 2dog boots Godot headless with the dummy rendering/audio drivers (set in
      # InputForgeTestFixture), so no real display is required; xvfb-run is a belt-and-braces wrapper
      # in case a Godot subsystem still probes for X11 on init. Smoke/benchmark tests
      # ([Trait("Category","Smoke")]) run too, but they only log timings (no asserts), so they don't
      # gate CI — their numbers are meaningless on variable CI hardware anyway.
      - name: Test
        run: >
          xvfb-run --auto-servernum
          dotnet run --project InputForge.Tests/InputForge.Tests.csproj
          --configuration Debug
          --no-build
